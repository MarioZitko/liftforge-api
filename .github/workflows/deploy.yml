name: Deploy API

on:
  push:
    branches: [main, uat, test]

# Only one deployment per environment at a time
concurrency:
  group: deploy-api-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest

    # Maps branch → GitHub Environment (lets you add protection rules / approvals in the repo settings)
    environment: ${{ github.ref_name == 'main' && 'production' || github.ref_name }}

    steps:
      # ── 1. Resolve environment metadata ──────────────────────────────────────
      - name: Set deploy environment
        id: env
        run: |
          case "${{ github.ref_name }}" in
            main)
              echo "ENV=prod"                          >> $GITHUB_OUTPUT
              echo "COMPOSE_FILE=docker-compose.prod.yml" >> $GITHUB_OUTPUT
              ;;
            uat)
              echo "ENV=uat"                           >> $GITHUB_OUTPUT
              echo "COMPOSE_FILE=docker-compose.uat.yml"  >> $GITHUB_OUTPUT
              ;;
            test)
              echo "ENV=test"                          >> $GITHUB_OUTPUT
              echo "COMPOSE_FILE=docker-compose.test.yml" >> $GITHUB_OUTPUT
              ;;
          esac
          # GHCR requires lowercase owner
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # ── 2. Checkout source ───────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 3. Build API image and push to GHCR ─────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.env.outputs.IMAGE_OWNER }}/liftforge-api:${{ steps.env.outputs.ENV }}
            ghcr.io/${{ steps.env.outputs.IMAGE_OWNER }}/liftforge-api:${{ github.sha }}
          # Layer cache stored in GitHub Actions cache — speeds up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 4. Deploy to VPS ─────────────────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/liftforge/liftforge-api

            echo "▶ Pulling latest compose files..."
            git fetch origin ${{ github.ref_name }}
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            echo "▶ Pulling new API image..."
            docker compose -f ${{ steps.env.outputs.COMPOSE_FILE }} pull api

            echo "▶ Restarting API container (migrations run automatically on start)..."
            docker compose -f ${{ steps.env.outputs.COMPOSE_FILE }} up -d --no-deps api

            echo "▶ Verifying container is running..."
            sleep 5
            docker compose -f ${{ steps.env.outputs.COMPOSE_FILE }} ps api

            echo "✅ API deployed to ${{ steps.env.outputs.ENV }}"
