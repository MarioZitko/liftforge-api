services:
  db:
    image: postgres:16-alpine
    env_file: .env.test
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - liftforge-test

  api:
    image: ghcr.io/mariozitko/liftforge-api:test
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.test
    environment:
      NODE_ENV: test
      PORT: 3000
    ports:
      - "3003:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - liftforge-test

  web:
    image: ghcr.io/mariozitko/liftforge-web:test
    build:
      context: ../liftforge-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://api.test.liftforge.xyz
    ports:
      - "4003:80"
    restart: unless-stopped
    networks:
      - liftforge-test

volumes:
  postgres-test-data:

networks:
  liftforge-test:
    driver: bridge
