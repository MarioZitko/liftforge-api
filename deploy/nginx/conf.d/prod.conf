# ─── liftforge.xyz (Frontend) ─────────────────────────────────────────────────
server {
    listen 80;
    server_name liftforge.xyz www.liftforge.xyz;
    return 301 https://liftforge.xyz$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name liftforge.xyz www.liftforge.xyz;

    ssl_certificate     /etc/letsencrypt/live/liftforge.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liftforge.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www → apex
    if ($host = www.liftforge.xyz) {
        return 301 https://liftforge.xyz$request_uri;
    }

    client_max_body_size 20m;

    location / {
        proxy_pass         http://localhost:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── api.liftforge.xyz (Backend API) ──────────────────────────────────────────
server {
    listen 80;
    server_name api.liftforge.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.liftforge.xyz;

    ssl_certificate     /etc/letsencrypt/live/api.liftforge.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.liftforge.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running requests
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
