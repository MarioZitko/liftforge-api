# ─── uat.liftforge.xyz (Frontend) ─────────────────────────────────────────────
server {
    listen 80;
    server_name uat.liftforge.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name uat.liftforge.xyz;

    ssl_certificate     /etc/letsencrypt/live/uat.liftforge.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uat.liftforge.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://localhost:4002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── api.uat.liftforge.xyz (Backend API) ──────────────────────────────────────
server {
    listen 80;
    server_name api.uat.liftforge.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.uat.liftforge.xyz;

    ssl_certificate     /etc/letsencrypt/live/api.uat.liftforge.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.uat.liftforge.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
