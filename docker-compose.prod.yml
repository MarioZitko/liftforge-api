services:
  db:
    image: postgres:16-alpine
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - liftforge-prod

  api:
    image: ghcr.io/mariozitko/liftforge-api:prod
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - liftforge-prod

  web:
    image: ghcr.io/mariozitko/liftforge-web:prod
    build:
      context: ../liftforge-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://api.liftforge.xyz
    ports:
      - "4001:80"
    restart: unless-stopped
    networks:
      - liftforge-prod

volumes:
  postgres-prod-data:

networks:
  liftforge-prod:
    driver: bridge
